<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner - Tenda de Oxóssi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #020c06; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }

.banner {
  width: 600px;
  height: 600px;
  background: radial-gradient(ellipse at 30% 20%, #0d3320 0%, #041a0f 55%, #020c06 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(184,155,94,0.15);
}

/* Círculos decorativos de fundo */
.banner::before {
  content: '';
  position: absolute;
  width: 480px;
  height: 480px;
  border-radius: 50%;
  border: 1px solid rgba(184,155,94,0.06);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.banner::after {
  content: '';
  position: absolute;
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 1px solid rgba(184,155,94,0.08);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.emblem {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 1px solid rgba(184,155,94,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(184,155,94,0.05);
  margin-bottom: 28px;
}

.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 46px;
  font-weight: 600;
  color: #f0e8d0;
  letter-spacing: 0.04em;
  text-align: center;
  line-height: 1.1;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #b89b5e;
  margin-bottom: 36px;
}

.divider {
  width: 50px;
  height: 1px;
  background: #b89b5e;
  opacity: 0.4;
  margin-bottom: 36px;
}

.tagline {
  font-size: 13px;
  font-weight: 300;
  color: rgba(240,232,208,0.5);
  letter-spacing: 0.08em;
  text-align: center;
  line-height: 1.8;
  margin-bottom: 32px;
}

.cta {
  background: rgba(184,155,94,0.12);
  border: 1px solid rgba(184,155,94,0.45);
  border-radius: 50px;
  padding: 10px 28px;
  font-size: 12px;
  font-weight: 500;
  color: #b89b5e;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.url {
  font-size: 11px;
  color: rgba(184,155,94,0.3);
  letter-spacing: 0.12em;
}

/* Canto decorativo */
.corner {
  position: absolute;
  opacity: 0.12;
}
.corner-tl { top: 24px; left: 24px; }
.corner-br { bottom: 24px; right: 24px; transform: rotate(180deg); }
</style>
</head>
<body>
<div class="banner">
  <!-- Cantos decorativos -->
  <svg class="corner corner-tl" width="40" height="40" viewBox="0 0 40 40" fill="none">
    <line x1="0" y1="40" x2="40" y2="0" stroke="#b89b5e" stroke-width="1"/>
    <line x1="0" y1="40" x2="12" y2="28" stroke="#b89b5e" stroke-width="1"/>
    <polyline points="40,0 32,2 38,8" fill="none" stroke="#b89b5e" stroke-width="1"/>
  </svg>
  <svg class="corner corner-br" width="40" height="40" viewBox="0 0 40 40" fill="none">
    <line x1="0" y1="40" x2="40" y2="0" stroke="#b89b5e" stroke-width="1"/>
    <line x1="0" y1="40" x2="12" y2="28" stroke="#b89b5e" stroke-width="1"/>
    <polyline points="40,0 32,2 38,8" fill="none" stroke="#b89b5e" stroke-width="1"/>
  </svg>

  <div class="content">
    <div class="emblem">
      <svg width="52" height="52" viewBox="0 0 42 42" fill="none">
        <line x1="6" y1="36" x2="36" y2="6" stroke="#b89b5e" stroke-width="1.5" stroke-linecap="round"/>
        <polyline points="36,6 28,8 34,14" fill="none" stroke="#b89b5e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="6" y1="36" x2="14" y2="28" stroke="#b89b5e" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="19" stroke="#b89b5e" stroke-width="0.7" opacity="0.3"/>
        <circle cx="21" cy="21" r="12" stroke="#b89b5e" stroke-width="0.5" opacity="0.2"/>
      </svg>
    </div>

    <h1 class="title">Tenda de Oxóssi</h1>
    <p class="subtitle">Terreiro de Umbanda</p>
    <div class="divider"></div>
    <p class="tagline">Agenda de giras · Confirmação de presença<br>Contato com o dirigente</p>
    <div class="cta">Acesse agora</div>
    <p class="url">tenda-oxossi.github.io</p>
  </div>
</div>
</body>
</html>
